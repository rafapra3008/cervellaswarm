[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "cervellaswarm-event-store"
version = "0.1.0"
description = "SQLite event database for AI agent session tracking and analytics"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.10"
authors = [{ name = "CervellaSwarm Contributors" }]
keywords = [
    "event-store",
    "ai-agents",
    "multi-agent",
    "sqlite",
    "analytics",
    "session-tracking",
    "observability",
    "claude-code",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
dependencies = []

[project.scripts]
cervella-events = "cervellaswarm_event_store.cli:main"

[project.urls]
Homepage = "https://github.com/rafapra3008/cervellaswarm"
Repository = "https://github.com/rafapra3008/cervellaswarm"
Documentation = "https://github.com/rafapra3008/cervellaswarm/tree/main/packages/event-store"
"Bug Tracker" = "https://github.com/rafapra3008/cervellaswarm/issues"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.9.0", "pyyaml>=6.0"]
test = ["pytest>=8.0", "pytest-cov>=5.0", "pyyaml>=6.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/cervellaswarm_event_store"]

[tool.hatch.build.targets.sdist]
include = ["src/", "tests/", "LICENSE", "NOTICE", "README.md", "CHANGELOG.md", "pyproject.toml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--tb=short", "-q"]

[tool.coverage.run]
source = ["cervellaswarm_event_store"]
omit = ["*/tests/*", "*/__main__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
