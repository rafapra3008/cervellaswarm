[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

# ---------------------------------------------------------------------------
# Project Metadata (PEP 621 + PEP 639)
# ---------------------------------------------------------------------------
[project]
name = "cervellaswarm-lingua-universale"
version = "0.1.1"
description = "Session types and formal protocols for AI agent communication"
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.10"
authors = [
    {name = "CervellaSwarm Contributors"},
]
keywords = [
    "session-types",
    "ai-agents",
    "formal-verification",
    "protocols",
    "multi-agent",
    "type-checking",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

# ZERO dependencies - pure Python standard library only
dependencies = []

# ---------------------------------------------------------------------------
# Project URLs
# ---------------------------------------------------------------------------
[project.urls]
Homepage = "https://github.com/rafapra3008/cervellaswarm"
Repository = "https://github.com/rafapra3008/cervellaswarm"
Documentation = "https://github.com/rafapra3008/cervellaswarm/tree/main/packages/lingua-universale"
"Bug Tracker" = "https://github.com/rafapra3008/cervellaswarm/issues"

# ---------------------------------------------------------------------------
# Console Scripts (C3.2)
# ---------------------------------------------------------------------------
[project.scripts]
lu = "cervellaswarm_lingua_universale._cli:main"

# ---------------------------------------------------------------------------
# Optional Dependencies
# ---------------------------------------------------------------------------
[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9.0",
]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

# ---------------------------------------------------------------------------
# Hatchling Build Config
# ---------------------------------------------------------------------------
[tool.hatch.build.targets.wheel]
packages = ["src/cervellaswarm_lingua_universale"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "LICENSE",
    "NOTICE",
    "README.md",
    "CHANGELOG.md",
    "pyproject.toml",
]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--tb=short", "-q"]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["cervellaswarm_lingua_universale"]
omit = ["*/tests/*", "*/__main__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
