[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

# ---------------------------------------------------------------------------
# Project Metadata (PEP 621 + PEP 639)
# ---------------------------------------------------------------------------
[project]
name = "cervellaswarm-agent-hooks"
version = "0.1.0"
description = "Ready-to-use hooks for Claude Code: bash validation, git reminders, file limits, context injection, and session checkpoints."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.10"
authors = [
    {name = "CervellaSwarm Contributors"},
]
keywords = [
    "claude-code",
    "hooks",
    "agent",
    "bash-validator",
    "multi-agent",
    "session-management",
    "developer-tools",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pyyaml>=6.0",
]

# ---------------------------------------------------------------------------
# CLI Entry Points
# ---------------------------------------------------------------------------
[project.scripts]
cervella-bash-validator = "cervellaswarm_agent_hooks.bash_validator:main"
cervella-git-reminder = "cervellaswarm_agent_hooks.git_reminder:main"
cervella-file-limits = "cervellaswarm_agent_hooks.file_limits:main"
cervella-context-inject = "cervellaswarm_agent_hooks.context_inject:main"
cervella-session-checkpoint = "cervellaswarm_agent_hooks.session_checkpoint:main"
cervella-hooks = "cervellaswarm_agent_hooks.cli:main"

# ---------------------------------------------------------------------------
# Project URLs
# ---------------------------------------------------------------------------
[project.urls]
Homepage = "https://github.com/rafapra3008/cervellaswarm"
Repository = "https://github.com/rafapra3008/cervellaswarm"
Documentation = "https://github.com/rafapra3008/cervellaswarm/tree/main/packages/agent-hooks"
"Bug Tracker" = "https://github.com/rafapra3008/cervellaswarm/issues"

# ---------------------------------------------------------------------------
# Optional Dependencies
# ---------------------------------------------------------------------------
[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9.0",
]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

# ---------------------------------------------------------------------------
# Hatchling Build Config
# ---------------------------------------------------------------------------
[tool.hatch.build.targets.wheel]
packages = ["src/cervellaswarm_agent_hooks"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "examples/",
    "LICENSE",
    "NOTICE",
    "README.md",
    "pyproject.toml",
]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--tb=short", "-q"]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["cervellaswarm_agent_hooks"]
omit = ["*/tests/*", "*/__main__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
