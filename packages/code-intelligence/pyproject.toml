[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

# ---------------------------------------------------------------------------
# Project Metadata (PEP 621 + PEP 639)
# ---------------------------------------------------------------------------
[project]
name = "cervellaswarm-code-intelligence"
version = "0.1.0"
description = "AST-based code analysis toolkit: symbol extraction, dependency graphs, semantic search, impact analysis, and repository mapping."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
requires-python = ">=3.10"
authors = [
    {name = "CervellaSwarm Contributors"},
]
keywords = [
    "ast",
    "code-analysis",
    "tree-sitter",
    "symbol-extraction",
    "dependency-graph",
    "semantic-search",
    "impact-analysis",
    "repository-mapping",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "tree-sitter>=0.23.0",
    "tree-sitter-language-pack>=0.3.0",
    "networkx>=3.0",
    "scipy>=1.10.0",
]

# ---------------------------------------------------------------------------
# CLI Entry Points
# ---------------------------------------------------------------------------
[project.scripts]
cervella-search = "cervellaswarm_code_intelligence.cli.search_cmd:main"
cervella-impact = "cervellaswarm_code_intelligence.cli.impact_cmd:main"
cervella-map = "cervellaswarm_code_intelligence.cli.map_cmd:main"

# ---------------------------------------------------------------------------
# Project URLs
# ---------------------------------------------------------------------------
[project.urls]
Homepage = "https://github.com/rafapra3008/cervellaswarm"
Repository = "https://github.com/rafapra3008/cervellaswarm"
Documentation = "https://github.com/rafapra3008/cervellaswarm/tree/main/packages/code-intelligence"
"Bug Tracker" = "https://github.com/rafapra3008/cervellaswarm/issues"

# ---------------------------------------------------------------------------
# Optional Dependencies
# ---------------------------------------------------------------------------
[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.9.0",
]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

# ---------------------------------------------------------------------------
# Hatchling Build Config
# ---------------------------------------------------------------------------
[tool.hatch.build.targets.wheel]
packages = ["src/cervellaswarm_code_intelligence"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "LICENSE",
    "NOTICE",
    "README.md",
    "pyproject.toml",
]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = ["--tb=short", "-q"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests requiring real file parsing",
]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["cervellaswarm_code_intelligence"]
omit = ["*/tests/*", "*/__main__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true
