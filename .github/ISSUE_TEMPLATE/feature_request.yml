name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Help us understand the problem you're trying to solve.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of CervellaSwarm does this relate to?
      options:
        - Agent Orchestration (Queen, task routing)
        - SNCP (session memory, persistence)
        - Hook System (lifecycle events, guards)
        - CLI (commands, output, UX)
        - MCP Server (integration)
        - Code Intelligence (AST, semantic search)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the pain point.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
      placeholder: It would be great if CervellaSwarm could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Willing to Contribute?
      description: Would you be interested in implementing this feature?
      options:
        - "Yes - I will submit a PR"
        - "Maybe - I could use some guidance"
        - "No - just suggesting"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples.
    validations:
      required: false
