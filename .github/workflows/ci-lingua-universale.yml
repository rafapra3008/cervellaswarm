# CI Workflow for cervellaswarm-lingua-universale
#
# Runs on push/PR when package files change.
# Matrix: Python 3.10, 3.11, 3.12, 3.13
# ZERO external dependencies - fastest CI of all packages.
#
# Quality is not negotiable.

name: Lingua Universale CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/lingua-universale/**'
      - '.github/workflows/ci-lingua-universale.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/lingua-universale/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: packages/lingua-universale/pyproject.toml

      - name: Install package with test dependencies
        run: pip install -e ".[test]"
        working-directory: packages/lingua-universale

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: pytest tests/ -q --tb=short
        working-directory: packages/lingua-universale

      - name: Run tests with coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=cervellaswarm_lingua_universale --cov-report=term --cov-report=xml --tb=short
        working-directory: packages/lingua-universale

      - name: Upload coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: lingua-universale-coverage
          path: packages/lingua-universale/coverage.xml
          retention-days: 30

  build-check:
    name: Build & Package Verify
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build
        working-directory: packages/lingua-universale

      - name: Verify package
        run: twine check dist/*
        working-directory: packages/lingua-universale

      - name: Test install from wheel
        run: |
          pip install dist/*.whl
          python -c "
          from cervellaswarm_lingua_universale import (
              SessionChecker, DelegateTask, TaskRequest, TaskStatus,
              ConfidenceScore, Confident, TrustScore, TrustTier,
              parse_protocol, Lean4Generator,
          )
          print('Import OK: all 9 modules accessible')
          "
        working-directory: packages/lingua-universale
