# Publish cervellaswarm-lingua-universale to PyPI
# Triggered on tag: lingua-universale-v*
# Trusted Publisher config on PyPI: workflow=publish-lingua-universale.yml, environment=pypi

name: Publish lingua-universale

on:
  push:
    tags:
      - 'lingua-universale-v[0-9]+.[0-9]+.[0-9]+'
      - 'lingua-universale-v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    uses: ./.github/workflows/_publish-package.yml
    with:
      package_name: "lingua-universale"
      package_dir: "packages/lingua-universale"
      pypi_name: "cervellaswarm-lingua-universale"
      module_name: "cervellaswarm_lingua_universale"
      release_description: "Runtime-verified communication protocols for AI agents. Zero dependencies."
