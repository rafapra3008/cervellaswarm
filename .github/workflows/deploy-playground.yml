# deploy-playground.yml
# Deploya playground/ su GitHub Pages (https://rafapra3008.github.io/cervellaswarm/)
# Trigger: push su main che modifica playground/**, oppure manuale via workflow_dispatch

name: Deploy Playground

on:
  push:
    branches: [main]
    paths: ['playground/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: playground
      - id: deployment
        uses: actions/deploy-pages@v4
