# CervellaSwarm - Weekly Maintenance
# Version: 1.1.0
#
# Runs weekly codebase analysis every Monday at 9:00 UTC

name: Weekly Maintenance

on:
  schedule:
    # Every Monday at 9:00 UTC
    - cron: '0 9 * * 1'

  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Weekly Analysis
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            ============================================
            WEEKLY MAINTENANCE - CERVELLASWARM
            ============================================

            You are a code maintenance analyst. Run a weekly codebase health check.

            CHECK:

            1. LARGE FILES (> 500 lines)
               - Find files that exceeded the threshold
               - Suggest splits if needed

            2. TODO/FIXME IN CODE
               - Find TODOs without linked issues
               - Identify forgotten FIXMEs

            3. DEPENDENCY UPDATES
               - Check requirements.txt / package.json
               - Note available updates

            4. DOCUMENTATION FRESHNESS
               - Are README and docs up to date?
               - Outdated documentation?

            5. CODE PATTERNS
               - Repeated patterns to extract
               - Potential optimizations

            ============================================
            OUTPUT
            ============================================

            If you find issues, create ONE issue with:
            - Title: "[Weekly] Maintenance YYYY-MM-DD"
            - Body: List of issues organized by category
            - Labels: maintenance, automated

            If everything is OK, do not create an issue.

          claude_args: |
            --allowedTools "Bash(gh issue:*),Read,Glob,Grep"
            --model claude-sonnet-4-6
            --max_turns 5

      - name: Log Completion
        run: |
          echo "Weekly maintenance completed!"
          echo "Date: $(date)"
