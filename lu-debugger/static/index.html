<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LU Debugger -- Lingua Universale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d1117;
            --bg-surface: #161b22;
            --bg-overlay: #1c2129;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --customer: #58a6ff;
            --warehouse: #3fb950;
            --payment: #d2a8ff;
            --violation: #f85149;
            --success: #3fb950;
            --accent: #58a6ff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---- Toolbar ---- */
        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-shrink: 0;
        }

        .toolbar-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-right: 8px;
        }

        .toolbar-title span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        .mode-select {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-overlay);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .mode-select:focus { border-color: var(--accent); }

        .btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-overlay);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s ease;
            user-select: none;
        }

        .btn:hover:not(:disabled) { background: #30363d; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-run {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }
        .btn-run:hover:not(:disabled) { background: #2ea043; }

        .btn-break {
            background: #8b2320;
            border-color: #da3633;
            color: #fff;
        }
        .btn-break:hover:not(:disabled) { background: #da3633; }

        .toolbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.offline { background: var(--text-muted); }

        .status-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ---- Main layout ---- */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow: hidden;
        }

        .protocol-panel {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 8px 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        #editor-container {
            flex: 1;
            overflow: hidden;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }

        /* ---- Chat messages ---- */
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            background: var(--bg-surface);
            border-left: 3px solid var(--border);
            animation: fadeSlideIn 0.3s ease;
        }

        .message.customer { border-left-color: var(--customer); }
        .message.warehouse { border-left-color: var(--warehouse); }
        .message.payment { border-left-color: var(--payment); }

        .message-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .step-badge {
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-overlay);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
        }

        .role-tag {
            font-weight: 600;
            font-size: 13px;
        }

        .role-tag.customer { color: var(--customer); }
        .role-tag.warehouse { color: var(--warehouse); }
        .role-tag.payment { color: var(--payment); }

        .arrow {
            color: var(--text-muted);
            font-size: 12px;
        }

        .msg-type {
            color: var(--text-muted);
            font-size: 11px;
            font-style: italic;
            margin-left: auto;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
        }

        /* ---- Choice ---- */
        .choice-msg {
            margin-bottom: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            font-size: 13px;
            animation: fadeSlideIn 0.3s ease;
        }

        .choice-msg code {
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
        }

        /* ---- Info ---- */
        .info-msg {
            margin-bottom: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(210, 168, 255, 0.08);
            border: 1px dashed rgba(210, 168, 255, 0.3);
            font-size: 13px;
            color: var(--payment);
            font-style: italic;
            animation: fadeSlideIn 0.3s ease;
        }

        /* ---- Violation ---- */
        .violation-msg {
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 8px;
            background: rgba(248, 81, 73, 0.08);
            border: 1px solid var(--violation);
            animation: shake 0.5s ease, fadeSlideIn 0.3s ease;
        }

        .violation-header {
            font-size: 14px;
            font-weight: 700;
            color: var(--violation);
            margin-bottom: 10px;
        }

        .violation-detail {
            font-size: 13px;
            margin-bottom: 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .violation-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .violation-label {
            color: var(--text-muted);
            min-width: 70px;
            font-weight: 600;
        }

        .violation-error {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text);
            padding-top: 10px;
            border-top: 1px solid rgba(248, 81, 73, 0.2);
        }

        /* ---- Done ---- */
        .done-msg {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            animation: fadeSlideIn 0.3s ease;
        }

        .done-msg.success {
            background: rgba(63, 185, 80, 0.08);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: var(--success);
        }

        .done-msg.blocked {
            background: rgba(248, 81, 73, 0.08);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: var(--violation);
        }

        /* ---- Error ---- */
        .error-msg {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(248, 81, 73, 0.06);
            border: 1px solid rgba(248, 81, 73, 0.2);
            color: var(--violation);
            font-size: 13px;
            animation: fadeSlideIn 0.3s ease;
        }

        /* ---- Empty state ---- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 14px;
            gap: 8px;
        }

        .empty-state-icon {
            font-size: 32px;
            opacity: 0.5;
        }

        .empty-state-hint {
            font-size: 12px;
        }

        /* ---- Monaco line decorations ---- */
        .current-line {
            background: rgba(88, 166, 255, 0.12) !important;
        }

        .violation-line {
            background: rgba(248, 81, 73, 0.15) !important;
        }

        .current-glyph {
            background: var(--accent);
            width: 3px !important;
            margin-left: 3px;
            border-radius: 2px;
        }

        .violation-glyph {
            background: var(--violation);
            width: 3px !important;
            margin-left: 3px;
            border-radius: 2px;
        }

        /* ---- Animations ---- */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: 40% 60%;
            }
            .protocol-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }

        /* ---- Scrollbar ---- */
        #chat-log::-webkit-scrollbar { width: 6px; }
        #chat-log::-webkit-scrollbar-track { background: transparent; }
        #chat-log::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-title">
            LU Debugger <span>Lingua Universale</span>
        </div>
        <div class="toolbar-sep"></div>
        <select id="mode-select" class="mode-select">
            <option value="demo">Demo</option>
            <option value="live">Live (Claude API)</option>
        </select>
        <button class="btn btn-run" id="btn-run" onclick="runSelected()">Run</button>
        <button class="btn btn-break" id="btn-break" onclick="runBreak()">Break</button>
        <div class="toolbar-right">
            <div class="status-dot" id="status-dot"></div>
            <span class="status-label" id="status-label">checking...</span>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="protocol-panel">
            <div class="panel-header">Protocol &middot; order_processing.lu</div>
            <div id="editor-container"></div>
        </div>
        <div class="chat-panel">
            <div class="panel-header">Agent Communication</div>
            <div id="chat-log">
                <div class="empty-state">
                    <div class="empty-state-icon">&#9654;</div>
                    <div>Click <strong>Run</strong> to execute the protocol</div>
                    <div class="empty-state-hint">
                        or <strong>Break</strong> to see a violation blocked
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        // ---- State ----
        let editor = null;
        let decorations = [];
        let evtSource = null;
        let isRunning = false;

        // ---- LU Monarch Tokenizer ----
        const luTokenizer = {
            defaultToken: '',
            tokenPostfix: '.lu',
            keywords: ['protocol', 'agent', 'type', 'when', 'decides', 'properties'],
            fields: ['role', 'trust', 'accepts', 'produces', 'requires', 'ensures', 'roles'],
            messageWords: ['asks', 'returns', 'sends', 'tells'],
            propertyWords: ['always', 'terminates', 'no', 'deadlock', 'deletion',
                           'participate', 'exclusive', 'cannot', 'before'],
            typeNames: ['TaskRequest', 'TaskResult', 'TaskStatus', 'DirectMessage',
                       'Broadcast', 'AuditVerdict', 'String', 'OrderStatus',
                       'Pending', 'Confirmed', 'OutOfStock'],
            trustLevels: ['standard', 'trusted', 'verified'],
            tokenizer: {
                root: [
                    [/#.*$/, 'comment'],
                    [/\b(protocol|agent|type)\b/, 'keyword'],
                    [/\b(when|decides)\b/, 'keyword.flow'],
                    [/\b(role|trust|accepts|produces|requires|ensures|roles)\b/, 'keyword.field'],
                    [/\b(asks|returns|sends|tells)\b/, 'keyword.message'],
                    [/\b(always|terminates|no|deadlock|deletion|participate|exclusive|cannot|before)\b/, 'keyword.property'],
                    [/\b(standard|trusted|verified)\b/, 'type.trust'],
                    [/\b(TaskRequest|TaskResult|TaskStatus|DirectMessage|Broadcast|AuditVerdict|String|OrderStatus|Pending|Confirmed|OutOfStock)\b/, 'type'],
                    [/\b(in_stock|out_of_stock|pass|fail)\b/, 'string'],
                    [/\b(to|for|of|the|an?)\b/, ''],
                    [/[a-zA-Z_]\w*:/, 'variable'],
                    [/[a-zA-Z_]\w*/, 'identifier'],
                    [/[|>=]/, 'operator'],
                    [/:/, 'delimiter'],
                ],
            },
        };

        // ---- Initialize Monaco ----
        require.config({
            paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }
        });

        require(['vs/editor/editor.main'], async function () {
            // Register LU language
            monaco.languages.register({ id: 'lu' });
            monaco.languages.setMonarchTokensProvider('lu', luTokenizer);

            // Define custom theme
            monaco.editor.defineTheme('lu-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '6a737d', fontStyle: 'italic' },
                    { token: 'keyword', foreground: 'ff7b72', fontStyle: 'bold' },
                    { token: 'keyword.flow', foreground: 'ff7b72' },
                    { token: 'keyword.field', foreground: 'd2a8ff' },
                    { token: 'keyword.message', foreground: '79c0ff' },
                    { token: 'keyword.property', foreground: '7ee787' },
                    { token: 'type', foreground: 'ffa657' },
                    { token: 'type.trust', foreground: 'ffa657', fontStyle: 'italic' },
                    { token: 'string', foreground: 'a5d6ff' },
                    { token: 'variable', foreground: 'ffa657' },
                    { token: 'identifier', foreground: 'e6edf3' },
                    { token: 'operator', foreground: 'ff7b72' },
                    { token: 'delimiter', foreground: '8b949e' },
                ],
                colors: {
                    'editor.background': '#0d1117',
                    'editor.lineHighlightBackground': '#161b2200',
                    'editorLineNumber.foreground': '#484f58',
                    'editorLineNumber.activeForeground': '#e6edf3',
                    'editorGutter.background': '#0d1117',
                },
            });

            // Fetch protocol source
            const res = await fetch('/api/protocol');
            const source = await res.text();

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: source,
                language: 'lu',
                theme: 'lu-dark',
                readOnly: true,
                minimap: { enabled: false },
                fontSize: 14,
                lineHeight: 22,
                scrollBeyondLastLine: false,
                lineNumbers: 'on',
                renderLineHighlight: 'none',
                overviewRulerLanes: 0,
                hideCursorInOverviewRuler: true,
                contextmenu: false,
                glyphMargin: true,
                folding: false,
                scrollbar: {
                    vertical: 'hidden',
                    horizontal: 'hidden',
                },
                padding: { top: 12 },
            });

            // Resize on window change
            window.addEventListener('resize', () => editor.layout());
        });

        // ---- Check live status ----
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                const label = document.getElementById('status-label');
                if (data.live_available) {
                    dot.classList.remove('offline');
                    label.textContent = 'Live ready';
                } else {
                    dot.classList.add('offline');
                    label.textContent = 'Demo only';
                    // Disable live option
                    const liveOpt = document.querySelector('#mode-select option[value="live"]');
                    if (liveOpt) liveOpt.disabled = true;
                }
            } catch {
                document.getElementById('status-dot').classList.add('offline');
                document.getElementById('status-label').textContent = 'offline';
            }
        }
        checkStatus();

        // ---- Highlight protocol line ----
        function highlightLine(lineNum, isViolation) {
            if (!editor || !lineNum) return;
            const cls = isViolation ? 'violation-line' : 'current-line';
            const glyph = isViolation ? 'violation-glyph' : 'current-glyph';
            decorations = editor.deltaDecorations(decorations, [{
                range: new monaco.Range(lineNum, 1, lineNum, 1),
                options: {
                    isWholeLine: true,
                    className: cls,
                    glyphMarginClassName: glyph,
                }
            }]);
            editor.revealLineInCenter(lineNum);
        }

        function clearHighlights() {
            if (!editor) return;
            decorations = editor.deltaDecorations(decorations, []);
        }

        // ---- Render chat messages ----
        function appendEvent(data) {
            const log = document.getElementById('chat-log');

            // Remove empty state on first message
            const empty = log.querySelector('.empty-state');
            if (empty) empty.remove();

            if (data.type === 'agent_message') {
                const div = document.createElement('div');
                div.className = 'message ' + data.from;
                div.innerHTML =
                    '<div class="message-header">' +
                        '<span class="step-badge">Step ' + data.step + '</span>' +
                        '<span class="role-tag ' + data.from + '">' + data.from + '</span>' +
                        '<span class="arrow">\u2192</span>' +
                        '<span class="role-tag ' + data.to + '">' + data.to + '</span>' +
                        '<span class="msg-type">' + data.message_type + '</span>' +
                    '</div>' +
                    '<div class="message-content">' + escapeHtml(data.content) + '</div>';
                log.appendChild(div);
                highlightLine(data.protocol_line, false);

            } else if (data.type === 'choice') {
                const div = document.createElement('div');
                div.className = 'choice-msg';
                div.innerHTML =
                    '<strong>' + data.who + '</strong> decides: ' +
                    '<code>' + data.branch + '</code>';
                log.appendChild(div);
                highlightLine(data.protocol_line, false);

            } else if (data.type === 'info') {
                const div = document.createElement('div');
                div.className = 'info-msg';
                div.textContent = data.content;
                log.appendChild(div);

            } else if (data.type === 'violation') {
                const div = document.createElement('div');
                div.className = 'violation-msg';
                div.innerHTML =
                    '<div class="violation-header">\uD83D\uDEAB PROTOCOL VIOLATION</div>' +
                    '<div class="violation-detail">' +
                        '<div class="violation-row">' +
                            '<span class="violation-label">Expected</span>' +
                            '<span>' + escapeHtml(data.expected) + '</span>' +
                        '</div>' +
                        '<div class="violation-row">' +
                            '<span class="violation-label">Got</span>' +
                            '<span>' + escapeHtml(data.got) + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="violation-error">' + escapeHtml(data.error) + '</div>';
                log.appendChild(div);
                highlightLine(data.protocol_line, true);

            } else if (data.type === 'done') {
                const div = document.createElement('div');
                if (data.completed) {
                    div.className = 'done-msg success';
                    div.textContent = 'Protocol completed. ' + data.messages + ' messages exchanged.';
                } else {
                    div.className = 'done-msg blocked';
                    div.textContent = 'Protocol blocked! ' + (data.messages || 0) + ' message(s) before violation.';
                }
                log.appendChild(div);

            } else if (data.type === 'error') {
                const div = document.createElement('div');
                div.className = 'error-msg';
                div.textContent = data.message;
                log.appendChild(div);
            }

            log.scrollTop = log.scrollHeight;
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ---- Run controls ----
        function setRunning(running) {
            isRunning = running;
            document.getElementById('btn-run').disabled = running;
            document.getElementById('btn-break').disabled = running;
            document.getElementById('mode-select').disabled = running;
        }

        function startStream(endpoint) {
            if (evtSource) evtSource.close();

            // Clear chat
            const log = document.getElementById('chat-log');
            log.innerHTML = '';
            clearHighlights();
            setRunning(true);

            evtSource = new EventSource(endpoint);

            evtSource.onmessage = function (e) {
                const data = JSON.parse(e.data);
                appendEvent(data);
                if (data.type === 'done' || data.type === 'error') {
                    evtSource.close();
                    evtSource = null;
                    setRunning(false);
                }
            };

            evtSource.onerror = function () {
                evtSource.close();
                evtSource = null;
                setRunning(false);
            };
        }

        function runSelected() {
            const mode = document.getElementById('mode-select').value;
            startStream('/api/run/' + mode);
        }

        function runBreak() {
            const mode = document.getElementById('mode-select').value;
            startStream('/api/run/' + mode + '-break');
        }
    </script>
</body>
</html>
